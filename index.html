<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feliz Día Mamá</title>
<style>
body {
  text-align: center;
  font-family: Arial;
  background: pink;
  overflow: hidden;
}

#mensaje {
  display: none;
  font-size: 30px;
  margin-top: 20px;
  animation: aparecer 2s forwards;
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

button {
  padding: 15px 25px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>✨ Tengo algo para ti ✨</h1>

<button onclick="mostrarMensaje()">Presiona aquí ❤️</button>

<div id="mensaje">
  💖 Feliz Día Mamá 💖 <br>
  Gracias por todo lo que haces por mí.
</div>

<script>
function mostrarMensaje() {
  document.getElementById("mensaje").style.display = "block";
}
</script>

</body>
</html>
